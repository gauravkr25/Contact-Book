<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        <form method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Email" required class="w-full p-2.5 border rounded-lg outline-none">
            <input type="password" name="password" placeholder="Password" required class="w-full p-2.5 border rounded-lg outline-none">
            <button class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700">Login</button>
        </form>
        <p class="mt-4 text-center text-sm">New here? <a href="/register" class="text-blue-600 font-bold">Register</a></p>
    </div>
</body>
