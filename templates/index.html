<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div class="container mx-auto max-w-5xl py-10 px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Contact Book <span class="text-blue-600">2026</span></h1>
            <div class="flex items-center gap-4">
                <form action="/" method="GET" class="relative">
                    <input type="text" name="search" value="{{ query }}" placeholder="Search..." class="pl-10 pr-4 py-2 border rounded-full outline-none w-64 shadow-sm focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
                </form>
                <a href="/logout" class="text-slate-500 hover:text-red-500 font-medium">Logout</a>
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}
                <div class="bg-blue-100 text-blue-700 p-3 rounded-lg mb-6 text-center text-sm font-medium">{{ m }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">New Contact</h2>
                    <form action="/add" method="POST" class="space-y-4">
                        <input type="text" name="name" placeholder="Full Name" required class="w-full p-2.5 bg-slate-50 border rounded-lg outline-none focus:border-blue-500">
                        <input type="tel" name="phone" placeholder="Phone" required class="w-full p-2.5 bg-slate-50 border rounded-lg outline-none focus:border-blue-500">
                        <input type="email" name="email" placeholder="Email" class="w-full p-2.5 bg-slate-50 border rounded-lg outline-none focus:border-blue-500">
                        <select name="category" class="w-full p-2.5 bg-slate-50 border rounded-lg outline-none">
                            <option>Personal</option><option>Work</option><option>Family</option>
                        </select>
                        <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Save & Notify</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr><th class="px-6 py-4 text-sm font-semibold">Contact</th><th class="px-6 py-4 text-sm font-semibold">Category</th><th class="px-6 py-4"></th></tr>
                        </thead>
                        <tbody class="divide-y">
                            {% for c in contacts %}
                            <tr class="hover:bg-slate-50">
                                <td class="px-6 py-4">
                                    <div class="font-bold text-slate-800">{{ c.name }}</div>
                                    <div class="text-xs text-slate-500">{{ c.phone }}</div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-700">{{ c.category }}</span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <a href="/delete/{{ c.id }}" onclick="return confirm('Delete?')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
